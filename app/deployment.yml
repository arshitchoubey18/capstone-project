apiVersion: apps/v1
kind: Deployment
metadata:
  name: capstone-app
  namespace: capstone
spec:
  replicas: 2
  selector:
    matchLabels:
      app: capstone
  template:
    metadata:
      labels:
        app: capstone
    spec:
      containers:
      - name: app
        image: <account-id>.dkr.ecr.ap-south-1.amazonaws.com/capstone-app:v1
        ports:
        - containerPort: 3000
